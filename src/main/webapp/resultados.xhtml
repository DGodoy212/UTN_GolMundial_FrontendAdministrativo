<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Registro de Resultados</h2>
        <h:form id="formResultados">

            <p:growl id="mensajes" showDetail="true" />
            <div class="ui-fluid">
                <p:panel>
                    <p:dataTable var="resultado" value="#{resultadoBean.partidosPendientes}" reflow="true" emptyMessage="No hay partidos pendientes.">

                        <p:column headerText="Partido">
                            <h:outputText value="#{resultado.seleccionLocalNombre} vs #{resultado.seleccionVisitanteNombre}" />
                        </p:column>

                        <p:column headerText="Goles Local">
                            <p:spinner value="#{resultado.golesLocal}" min="0" />
                        </p:column>

                        <p:column headerText="Goles Visitante">
                            <p:spinner value="#{resultado.golesVisitante}" min="0" />
                        </p:column>

                        <p:column headerText="Estado">
                            <h:outputText value="#{resultado.estado}" />
                        </p:column>


                        <p:column headerText="Acciones">
                            <p:commandButton value="Guardar"
                                             icon="pi pi-save"
                                             styleClass="ui-button-success"
                                             action="#{resultadoBean.guardarResultado(resultado)}"
                                             update="@form" />
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </div>
        </h:form>

    </ui:define>
</ui:composition>
</html>
