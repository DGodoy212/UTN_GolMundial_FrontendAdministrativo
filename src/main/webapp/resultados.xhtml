<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Registro de Resultados</h2>

        <h:form>
            <p:panel>
                <p:dataTable var="resultado" value="[]" emptyMessage="No hay resultados ingresados aún.">

                    <p:column headerText="Partido">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Goles Local">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Goles Visitante">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Estado del Partido">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Acciones" width="120" style="text-align: center;">
                        <p:button icon="pi pi-check-circle" styleClass="ui-button-success ui-button-flat" title="Validar Resultado"/>
                    </p:column>

                </p:dataTable>
            </p:panel>
        </h:form>

    </ui:define>
</ui:composition>
</html>
