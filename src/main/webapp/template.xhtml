<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>GolMundial 2026 - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        /* Corrección de visibilidad para el menú lateral de PrimeFaces */
        .sidebar-menu.ui-menu {
            background: transparent !important;
            border: none !important;
            width: 100% !important;
        }
        .sidebar-menu .ui-menuitem-link {
            color: #ffffff !important;
            padding: 12px 18px !important;
        }
        .sidebar-menu .ui-menuitem-link .ui-menuitem-text,
        .sidebar-menu .ui-menuitem-link .ui-icon {
            color: #ffffff !important;
            font-weight: 500;
        }
        .sidebar-menu .ui-menuitem-link:hover {
            background-color: #2c3e50 !important;
        }
        .logout-link .ui-menuitem-link .ui-menuitem-text,
        .logout-link .ui-menuitem-link .ui-icon {
            color: #e74c3c !important;
        }
    </style>
</h:head>

<h:body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f9;">

    <div style="background-color: #2c3e50; padding: 15px; color: white; border-bottom: 3px solid #1abc9c;">
        <h2 style="margin: 0; font-size: 20px;">Panel Administrativo - GolMundial 2026</h2>
    </div>

    <div style="display: flex; height: calc(100vh - 65px);">

        <div style="width: 250px; background-color: #34495e; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">
            <h:form>
                <p:menu styleClass="sidebar-menu">
                    <p:menuitem value="Dashboard" outcome="dashboard" icon="pi pi-home"/>
                    <p:menuitem value="Partidos" outcome="partidos" icon="pi pi-calendar"/>
                    <p:menuitem value="Resultados" outcome="resultados" icon="pi pi-check-square"/>
                    <p:menuitem value="Usuarios" outcome="usuarios" icon="pi pi-users"/>
                    <p:menuitem value="Reportes" outcome="reportes" icon="pi pi-chart-bar"/>
                    <p:menuitem value="Auditoría" outcome="auditoria" icon="pi pi-list"/>
                    <p:menuitem value="Cerrar Sesión" action="#{loginBean.logout}" icon="pi pi-sign-out" styleClass="logout-link"/>
                </p:menu>
            </h:form>
        </div>

        <div style="flex-grow: 1; padding: 25px; overflow-y: auto;">
            <ui:insert name="content">
            </ui:insert>
        </div>

    </div>
</h:body>
</html>
