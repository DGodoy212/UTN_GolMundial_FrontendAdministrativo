<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login - GolMundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-box { width: 350px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</h:head>
<h:body>
    <h:form>
        <p:panel header="Acceso Administrativo" styleClass="login-box">

            <h2 style="color: #2c3e50; margin-top: 0;">GolMundial 2026</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px;">Ingrese sus credenciales</p>

            <p:inputText placeholder="Usuario" style="width: 90%; margin-bottom: 15px;" required="true"/>
            <p:password placeholder="Contraseña" style="width: 90%; margin-bottom: 20px;" required="true"/>

            <p:commandButton value="Entrar al Sistema" action="dashboard?faces-redirect=true"
                             style="width: 90%; background-color: #3498db; border: none; padding: 5px;"/>
        </p:panel>
    </h:form>
</h:body>
</html>
