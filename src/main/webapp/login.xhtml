<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login - GolMundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-box { width: 350px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</h:head>
<h:body>
    <h:form>
        <!-- Esta etiqueta mostrará la caja roja de error -->
        <p:messages id="mensajes" showDetail="true" closable="true" />

        <p:panel header="Iniciar Sesión">
            <h:panelGrid columns="2" cellpadding="5">
                <p:outputLabel for="username" value="Usuario:" />
                <p:inputText id="username" value="#{loginBean.username}" required="true" />

                <p:outputLabel for="password" value="Contraseña:" />
                <p:password id="password" value="#{loginBean.password}" required="true" />
            </h:panelGrid>

            <!-- Le agregamos update="mensajes" al botón -->
            <p:commandButton value="Ingresar" action="#{loginBean.login}" update="mensajes" style="margin-top: 10px;" />
        </p:panel>
    </h:form>
</h:body>
</html>
