<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Gestión de Partidos</h2>
        <h:form id="formPartidos">
            <p:growl id="mensajes" showDetail="true" />

            <p:toolbar style="margin-bottom: 15px;">
                <p:toolbarGroup>
                    <p:commandButton value="Nuevo Partido"
                                     icon="pi pi-plus"
                                     styleClass="ui-button-success"
                                     actionListener="#{partidoBean.prepararNuevo}"
                                     oncomplete="PF('dialogoNuevo').show()"
                                     update=":formNuevoPartido"/>
                </p:toolbarGroup>
            </p:toolbar>

            <p:panel>
                <div class="ui-fluid">
                    <p:dataTable var="partido" value="#{partidoBean.partidos}" reflow="true" emptyMessage="No hay partidos programados aún.">

                        <p:column headerText="Fase">
                            <h:outputText value="#{partido.fase}" />
                        </p:column>

                        <p:column headerText="Grupo">
                            <h:outputText value="#{partido.grupo}" />
                        </p:column>

                        <p:column headerText="Fecha">
                            <h:outputText value="#{partido.fechaHoraUtc}" />
                        </p:column>

                        <p:column headerText="Equipo Local">
                            <h:outputText value="#{partido.seleccionLocalNombre}" />
                        </p:column>

                        <p:column headerText="Equipo Visitante">
                            <h:outputText value="#{partido.seleccionVisitanteNombre}" />
                        </p:column>

                        <p:column headerText="Estadio">
                            <h:outputText value="#{partido.sedeNombre}" />
                        </p:column>

                        <p:column headerText="Estado">
                            <h:outputText value="#{partido.estado}" />
                        </p:column>

                        <p:column headerText="Acciones" width="120" style="text-align: center;">
                            <p:commandButton icon="pi pi-pencil"
                                             styleClass="ui-button-warning ui-button-flat"
                                             title="Editar"
                                             oncomplete="PF('dialogoEdicion').show()"
                                             update=":formPartidos:modalEdicion">
                                <f:setPropertyActionListener value="#{partido}" target="#{partidoBean.partidoSeleccionado}" />
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </div>
            </p:panel>

            <!-- Ventana emergente para editar -->
            <p:dialog header="Editar Partido" widgetVar="dialogoEdicion" modal="true" showEffect="fade" hideEffect="fade" resizable="false">
                <p:outputPanel id="modalEdicion" style="text-align:center;">
                    <p:panelGrid columns="2" rendered="#{not empty partidoBean.partidoSeleccionado}" columnClasses="label,value">

                        <h:outputText value="Sede (ID):" />
                        <p:spinner value="#{partidoBean.partidoSeleccionado.sedeId}" min="1" />

                        <h:outputText value="Estado:" />
                        <p:selectOneMenu value="#{partidoBean.partidoSeleccionado.estado}">
                            <f:selectItem itemLabel="Programado" itemValue="PROGRAMADO" />
                            <f:selectItem itemLabel="En Juego" itemValue="EN_JUEGO" />
                            <f:selectItem itemLabel="Finalizado" itemValue="FINALIZADO" />
                        </p:selectOneMenu>

                    </p:panelGrid>
                    <p:divider />
                    <p:commandButton value="Guardar" icon="pi pi-check" action="#{partidoBean.guardarEdicion}"
                                     update=":formPartidos" oncomplete="PF('dialogoEdicion').hide()" />
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('dialogoEdicion').hide()" type="button"
                                     styleClass="ui-button-secondary" />
                </p:outputPanel>
            </p:dialog>

        </h:form>

        <!-- Diálogo modal para registrar nuevo partido -->
        <p:dialog id="dlgNuevoPartido" header="Registrar Nuevo Partido" widgetVar="dialogoNuevo" modal="true" showEffect="fade" hideEffect="fade" resizable="false">
            <h:form id="formNuevoPartido">
                <p:outputPanel style="text-align:center;">
                    <p:panelGrid columns="2" columnClasses="label,value">
                        <h:outputText value="Fase:" />
                        <p:inputText value="#{partidoBean.nuevoPartido.fase}" />

                        <h:outputText value="Grupo:" />
                        <p:inputText value="#{partidoBean.nuevoPartido.grupo}" />

                        <h:outputText value="ID Selección Local:" />
                        <p:spinner value="#{partidoBean.nuevoPartido.seleccionLocalId}" min="1" />

                        <h:outputText value="ID Selección Visitante:" />
                        <p:spinner value="#{partidoBean.nuevoPartido.seleccionVisitanteId}" min="1" />

                        <h:outputText value="Fecha y Hora (UTC):" />
                        <p:inputText value="#{partidoBean.nuevoPartido.fechaHoraUtc}" placeholder="2026-06-11T19:00:00Z" />

                        <h:outputText value="ID Sede:" />
                        <p:spinner value="#{partidoBean.nuevoPartido.sedeId}" min="1" />

                        <h:outputText value="Estado inicial:" />
                        <p:selectOneMenu value="#{partidoBean.nuevoPartido.estado}">
                            <f:selectItem itemLabel="Programado" itemValue="PROGRAMADO" />
                            <f:selectItem itemLabel="En Juego" itemValue="EN_JUEGO" />
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:divider />
                    <p:commandButton value="Guardar" icon="pi pi-check" action="#{partidoBean.guardarNuevoPartido}"
                                     update=":formPartidos" oncomplete="PF('dialogoNuevo').hide()" />
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('dialogoNuevo').hide()" type="button"
                                     styleClass="ui-button-secondary" />
                </p:outputPanel>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
</html>
