<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Gestión de Partidos</h2>

        <p:panel>
            <div class="ui-fluid">
                <p:dataTable var="partido" value="#{partidoBean.partidos}" reflow="true" emptyMessage="No hay partidos programados aún.">

                    <p:column headerText="Fecha">
                        <h:outputText value="#{partido.fechaHoraUtc}" />
                    </p:column>

                    <p:column headerText="Equipo Local">
                        <h:outputText value="#{partido.seleccionLocalNombre}" />
                    </p:column>

                    <p:column headerText="Equipo Visitante">
                        <h:outputText value="#{partido.seleccionVisitanteNombre}" />
                    </p:column>

                    <p:column headerText="Estadio">
                        <h:outputText value="#{partido.sedeNombre}" />
                    </p:column>

                    <p:column headerText="Estado">
                        <h:outputText value="#{partido.estado}" />
                    </p:column>

                    <p:column headerText="Acciones" width="100" style="text-align: center;">
                        <p:button icon="pi pi-pencil" styleClass="ui-button-warning ui-button-flat" title="Editar"/>
                        <p:button icon="pi pi-trash" styleClass="ui-button-danger ui-button-flat" title="Eliminar"/>
                    </p:column>
                </p:dataTable>
            </div>
        </p:panel>

    </ui:define>
</ui:composition>
</html>
