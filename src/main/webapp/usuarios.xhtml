<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Gestión de Usuarios</h2>

        <h:form>
            <p:toolbar style="margin-bottom: 15px;">
                <p:toolbarGroup>
                    <p:commandButton value="Nuevo Usuario" icon="pi pi-user-plus" styleClass="ui-button-success" />
                </p:toolbarGroup>
            </p:toolbar>

            <p:panel>
                <p:dataTable var="usuario" value="[]" emptyMessage="No hay usuarios registrados.">

                    <p:column headerText="Nombre">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Correo">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Rol">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Estado">
                        <h:outputText value="-" />
                    </p:column>

                    <p:column headerText="Acciones" width="100" style="text-align: center;">
                        <p:button icon="pi pi-pencil" styleClass="ui-button-warning ui-button-flat" title="Editar"/>
                        <p:button icon="pi pi-trash" styleClass="ui-button-danger ui-button-flat" title="Eliminar"/>
                    </p:column>

                </p:dataTable>
            </p:panel>
        </h:form>

    </ui:define>
</ui:composition>
</html>
