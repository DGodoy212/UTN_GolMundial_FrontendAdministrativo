<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Gestión de Usuarios</h2>

        <h:form>
            <p:toolbar style="margin-bottom: 15px;">
                <p:toolbarGroup>
                    <p:commandButton value="Nuevo Usuario" icon="pi pi-user-plus" styleClass="ui-button-success" />
                </p:toolbarGroup>
            </p:toolbar>

            <div class="ui-fluid">
                <p:panel>
                    <p:dataTable var="usuario" value="#{usuarioBean.usuarios}" reflow="true" emptyMessage="No hay usuarios registrados.">
                        <p:column headerText="Nombre">
                            <h:outputText value="#{usuario.nombre}" />
                        </p:column>
                        <p:column headerText="Correo">
                            <h:outputText value="#{usuario.email}" />
                        </p:column>
                        <p:column headerText="Rol">
                            <h:outputText value="#{usuario.rol}" />
                        </p:column>
                        <p:column headerText="Estado">
                            <h:outputText value="#{usuario.activo ? 'Activo' : 'Inactivo'}" />
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </div>
        </h:form>

    </ui:define>
</ui:composition>
</html>
