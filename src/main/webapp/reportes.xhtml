<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h2 style="color: #2c3e50; margin-top: 0;">Reportes Estadísticos</h2>

        <h:form>
            <div style="display: flex; gap: 20px;">
                <p:panel header="Resumen Financiero y Predicciones">
                    <h:panelGrid columns="2" cellpadding="10">
                        <h:outputText value="Partido con más predicciones:" style="font-weight:bold"/>
                        <h:outputText value="#{reporteBean.reporteGeneral.partidoMasPredicciones}" />

                        <h:outputText value="Total de predicciones registradas:" style="font-weight:bold"/>
                        <h:outputText value="#{reporteBean.reporteGeneral.totalPredicciones}" />

                        <h:outputText value="UGC en circulación:" style="font-weight:bold"/>
                        <h:outputText value="#{reporteBean.reporteGeneral.ugcEnCirculacion} Monedas" />
                    </h:panelGrid>
                </p:panel>
            </div>
        </h:form>

    </ui:define>
</ui:composition>
</html>
