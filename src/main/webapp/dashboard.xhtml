<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">

<ui:composition template="template.xhtml">
    <ui:define name="content">

        <h1>Bienvenido al Dashboard</h1>

        <p:panelGrid columns="4" layout="grid" styleClass="ui-panelgrid-blank">
            <p:card style="text-align: center; background-color: #f4f4f4;">
                <h3>#{dashboardBean.totalPartidos}</h3>
                <p>Partidos Programados</p>
            </p:card>

            <p:card style="text-align: center; background-color: #f4f4f4;">
                <h3>#{dashboardBean.usuariosRegistrados}</h3>
                <p>Usuarios Activos</p>
            </p:card>

            <p:card style="text-align: center; background-color: #f4f4f4;">
                <h3>#{dashboardBean.totalPredicciones}</h3>
                <p>Predicciones Realizadas</p>
            </p:card>

            <p:card style="text-align: center; background-color: #f4f4f4;">
                <h3>#{dashboardBean.monedasCirculando}</h3>
                <p>UGC en Circulación</p>
            </p:card>
        </p:panelGrid>

    </ui:define>
</ui:composition>
</html>
